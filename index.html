<style>

  /* Card visuals */

  /* Table */

  .bid-picker{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:14px 0;}
  .bid-btn{
    width:46px; height:46px; border-radius:50%; border:2px solid var(--gold); background:var(--felt-dark);
    color:var(--cream); font-weight:800; font-size:16px; cursor:pointer; font-family:'Cinzel',serif;
  }
  .bid-btn.selected{ background:var(--gold); color:var(--ink); }
  .bid-btn:disabled{ opacity:.25; cursor:not-allowed; border-color:#555;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center;
    padding:16px; z-index:50;

  .round-summary-row{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed rgba(255,255,255,.15); font-size:14px;}
  .round-summary-row .name{ font-weight:700; }
  .round-summary-row .detail{ opacity:.75; font-size:12.5px; }
  .delta-add{ color:#e88; font-weight:800; }
  .delta-zero{ color:#8e8; font-weight:800; }

  .winner-banner{
    font-family:'Cinzel',serif; font-size:26px; color:var(--gold-light); text-align:center; margin:10px 0;
    text-shadow:0 0 20px rgba(201,162,39,.4);
  }
  .rules-link{ background:none; border:none; color:var(--gold-light); text-decoration:underline; cursor:pointer; font-size:13px; margin-top:14px; font-family:'Nunito Sans',sans-serif;}
  .rules-text{ font-size:13.5px; line-height:1.6; opacity:.9; max-height:60vh; overflow-y:auto; }
  .rules-text h3{ color:var(--gold-light); font-family:'Cinzel',serif; margin-bottom:4px;}
  .section-title{ font-family:'Cinzel',serif; color:var(--gold-light); font-size:18px; text-align:center; margin-bottom:6px; letter-spacing:.04em;}
  .center-text{ text-align:center; }

<script>
// ============================================================
// ====== STORAGE SHIM (per hosting esterno) ===================
// ============================================================
// Il gioco originale usava "window.storage", l'API di storage interna
// di Claude.ai, disponibile SOLO dentro Claude.ai. Per farlo funzionare
// su un hosting esterno (GitHub Pages, Netlify, ecc.) qui sotto ricreiamo
// la stessa identica interfaccia (get/set/delete) appoggiandoci a:
//  - Firebase Realtime Database per i dati CONDIVISI (le stanze online, viste da tutti i giocatori)
//  - localStorage per i dati PERSONALI (l'identità del singolo dispositivo)
//
// URL del tuo Firebase Realtime Database (senza slash finale)
const FIREBASE_URL = 'https://dal-358d6-default-rtdb.firebaseio.com';

const STORAGE_READY = !!FIREBASE_URL && !FIREBASE_URL.startsWith('INSERISCI');

(function(){
  function fbUrl(key){ return FIREBASE_URL + '/' + encodeURIComponent(key) + '.json'; }

  async function fbGet(key){
    if(!STORAGE_READY) return null;
    try{
      const res = await fetch(fbUrl(key));
      if(!res.ok) return null;
      const data = await res.json();
      if(data===null || data===undefined) return null;
      return {key, value:data, shared:true};
    }catch(e){ return null; }
  }
  async function fbSet(key, value){
    if(!STORAGE_READY) return null;
    try{
      await fetch(fbUrl(key), {method:'PUT', body: JSON.stringify(value)});
      return {key, value, shared:true};
    }catch(e){ return null; }
  }
  async function fbDelete(key){
    if(!STORAGE_READY) return null;
    try{
      await fetch(fbUrl(key), {method:'DELETE'});
      return {key, deleted:true, shared:true};
    }catch(e){ return null; }
  }

  function lsGet(key){
    try{
      const value = localStorage.getItem('dn_local_'+key);
      if(value===null) return null;
      return {key, value, shared:false};
    }catch(e){ return null; }
  }
  function lsSet(key, value){
    try{
      localStorage.setItem('dn_local_'+key, value);
      return {key, value, shared:false};
    }catch(e){ return null; }
  }
  function lsDelete(key){
    try{
      localStorage.removeItem('dn_local_'+key);
      return {key, deleted:true, shared:false};
    }catch(e){ return null; }
  }

  window.storage = {
    get: (key, shared)=> shared ? fbGet(key) : Promise.resolve(lsGet(key)),
    set: (key, value, shared)=> shared ? fbSet(key, value) : Promise.resolve(lsSet(key, value)),
    delete: (key, shared)=> shared ? fbDelete(key) : Promise.resolve(lsDelete(key)),
    list: async (prefix, shared)=> ({keys:[], prefix, shared:!!shared}) // non usato da questo gioco
  };
})();

const SUITS = ['bastoni','spade','coppe','denari']; // low -> high
const SUIT_LABEL = {bastoni:'Bastoni', spade:'Spade', coppe:'Coppe', denari:'Denari'};
const SUIT_COLOR = {bastoni:'var(--bastoni)', spade:'var(--spade)', coppe:'var(--coppe)', denari:'var(--denari)'};

function suitIcon(suit, size){
  const s = size || 30;
  const icons = {
    bastoni: `<svg viewBox="0 0 40 40" width="${s}" height="${s}"><rect x="17" y="4" width="6" height="30" rx="3" fill="${SUIT_COLOR.bastoni}"/><ellipse cx="20" cy="34" rx="9" ry="4" fill="${SUIT_COLOR.bastoni}"/></svg>`,
    spade: `<svg viewBox="0 0 40 40" width="${s}" height="${s}"><path d="M20 3 L27 16 L33 22 L24 22 L26 33 L14 33 L16 22 L7 22 L13 16 Z" fill="${SUIT_COLOR.spade}"/></svg>`,
    coppe: `<svg viewBox="0 0 40 40" width="${s}" height="${s}"><path d="M9 6 h22 c0 12 -5 17 -11 17 s-11 -5 -11 -17 Z" fill="${SUIT_COLOR.coppe}"/><rect x="18" y="23" width="4" height="8" fill="${SUIT_COLOR.coppe}"/><rect x="13" y="31" width="14" height="3" rx="1.5" fill="${SUIT_COLOR.coppe}"/></svg>`,
    denari: `<svg viewBox="0 0 40 40" width="${s}" height="${s}"><circle cx="20" cy="20" r="15" fill="none" stroke="${SUIT_COLOR.denari}" stroke-width="4"/><circle cx="20" cy="20" r="6" fill="${SUIT_COLOR.denari}"/></svg>`
  };
  return icons[suit] || '';
}

function valueLabel(v){
  if(v<=7) return String(v);
  if(v===8) return 'Fante';
  if(v===9) return 'Cavallo';
  if(v===10) return 'Re';
}
function valueCorner(v){
  if(v<=7) return String(v);
  if(v===8) return 'F';
  if(v===9) return 'C';
  if(v===10) return 'R';
}

function createDeck(){
  const deck = [];
  for(const suit of SUITS){
    for(let v=1; v<=10; v++){
      if(suit==='denari' && v===1) continue; // asso di denari non esiste
      deck.push({suit, value:v, id:suit+'-'+v});
    }
  }
  deck.push({suit:'jolly', value:null, id:'jolly'});
  return deck; // 40 cards
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function rankOf(card){
  const si = SUITS.indexOf(card.suit);
  return si*10 + card.value;
}

// ---------------- GAME STATE ----------------
let game = null;

function newGame(names){
  const players = names.map((n,i)=>({
    id:'p'+i, name:n, seat:i, score:0, eliminated:false
  }));
  game = {
    players,
    dealerSeat: 0,
    roundCycle: [5,4,3,2,1],
    roundCycleIndex: 0,
    roundCardCount: 5,
    roundNumber: 1,
    hands: {},
    bids: {},
    bidOrder: [],
    tricksWon: {},
    playOrder: [],
    turnPointer: 0,
    table: [], // {playerId, card, jokerCall}
    trickIndex: 0,
    phase: 'roundIntro',
    lastRoundSummary: null,
    pendingJokerCard: null,
  };
  startRound();
}

function activePlayers(){
  return game.players.filter(p=>!p.eliminated);
}

function seatOrderFromDealer(){
  // returns active players array ordered starting right after dealer, ending at dealer
  const active = activePlayers();
  // find dealer among active by seat >= dealerSeat wrap, dealer always points to an active player's seat
  const dealerIdx = active.findIndex(p=>p.seat===game.dealerSeat);
  const order = [];
  for(let i=1;i<=active.length;i++){
    order.push(active[(dealerIdx+i)%active.length]);
  }
  return order; // last element is dealer
}

function rotateCircleFrom(circle, startId){
  const idx = circle.indexOf(startId);
  const out = [];
  for(let i=0;i<circle.length;i++) out.push(circle[(idx+i)%circle.length]);
  return out;
}

function startRound(){
  game.roundCardCount = game.roundCycle[game.roundCycleIndex];
  const active = activePlayers();
  const order = seatOrderFromDealer();
  // fixed seating circle (antiorario) used only to figure out who's "next" after a trick winner
  game.seatCircle = active.map(p=>p.id);
  // first trick of the round always opens with the player after the dealer, same as the bidding order
  game.playOrder = order.map(p=>p.id);
  game.bidOrder = order.map(p=>p.id);

  const deck = shuffle(createDeck());
  game.hands = {};
  active.forEach((p,i)=>{
    game.hands[p.id] = deck.slice(i*game.roundCardCount, (i+1)*game.roundCardCount);
  });
  game.bids = {};
  game.tricksWon = {};
  active.forEach(p=>{ game.bids[p.id]=null; game.tricksWon[p.id]=0; });
  game.table = [];
  game.trickIndex = 0;
  game.turnPointer = 0;
  game.phase = 'roundIntro';
}

function currentBidderId(){ return game.bidOrder[game.turnPointer]; }
function currentPlayerToPlayId(){ return game.playOrder[game.turnPointer]; }
function playerById(id){ return game.players.find(p=>p.id===id); }

function sumBidsSoFar(){
  let sum=0;
  for(const id of game.bidOrder){
    if(game.bids[id]!==null) sum += game.bids[id];
  }
  return sum;
}
function isLastBidder(){ return game.turnPointer === game.bidOrder.length-1; }

function placeBid(playerId, value){
  game.bids[playerId] = value;
  game.turnPointer++;
  if(game.turnPointer >= game.bidOrder.length){
    game.turnPointer = 0;
    if(game.roundCardCount===1){
      // blind round: auto-play all cards in order immediately
      autoPlayBlindRound();
    } else {
      game.phase = 'passToPlay';
    }
  }
  render();
}

function autoPlayBlindRound(){
  game.table = [];
  for(const id of game.playOrder){
    const card = game.hands[id][0];
    let jokerCall = null;
    if(card.suit==='jolly'){
      // decide automatically: alternate strategy not needed, ask via modal instead
    }
    game.table.push({playerId:id, card, jokerCall});
  }
  // if a joker exists among these, we need the owner's choice - handle via modal before finalizing
  const jokerEntry = game.table.find(t=>t.card.suit==='jolly');
  if(jokerEntry && jokerEntry.jokerCall===null){
    game.phase = 'blindJokerChoice';
    game.pendingJokerCard = jokerEntry.playerId;
  } else {
    resolveTrick();
  }
}

function playCard(playerId, cardId){
  const hand = game.hands[playerId];
  const idx = hand.findIndex(c=>c.id===cardId);
  const card = hand[idx];
  if(card.suit==='jolly'){
    game.pendingJokerCard = {playerId, cardIdx:idx};
    game.phase = 'jokerChoice';
    render();
    return;
  }
  finalizePlay(playerId, idx, null);
}

function finalizePlay(playerId, cardIdx, jokerCall){
  const hand = game.hands[playerId];
  const card = hand.splice(cardIdx,1)[0];
  game.table.push({playerId, card, jokerCall});
  game.turnPointer++;
  if(game.turnPointer >= game.playOrder.length){
    resolveTrick();
  } else {
    game.phase = 'playing';
    render();
  }
}

function confirmJokerChoice(choice){
  if(game.phase==='blindJokerChoice'){
    const entry = game.table.find(t=>t.playerId===game.pendingJokerCard);
    entry.jokerCall = choice;
    game.pendingJokerCard = null;
    resolveTrick();
    return;
  }
  const {playerId, cardIdx} = game.pendingJokerCard;
  game.pendingJokerCard = null;
  finalizePlay(playerId, cardIdx, choice);
}

function effectiveRank(entry){
  if(entry.card.suit==='jolly'){
    return entry.jokerCall==='alta' ? Infinity : -Infinity;
  }
  return rankOf(entry.card);
}

function resolveTrick(){
  let winner = game.table[0];
  for(const entry of game.table){
    if(effectiveRank(entry) > effectiveRank(winner)) winner = entry;
  }
  game.tricksWon[winner.playerId]++;
  game.lastTrickWinner = winner.playerId;
  game.phase = 'trickResult';
  render();
}

function nextTrickOrEndRound(){
  game.table = [];
  game.trickIndex++;
  game.turnPointer = 0;
  if(game.trickIndex >= game.roundCardCount){
    endRound();
  } else {
    game.playOrder = rotateCircleFrom(game.seatCircle, game.lastTrickWinner);
    game.phase = 'passToPlay';
    render();
  }
}

function endRound(){
  const active = activePlayers();
  const summary = active.map(p=>{
    const bid = game.bids[p.id];
    const won = game.tricksWon[p.id];
    const delta = Math.abs(bid-won);
    p.score += delta;
    return {id:p.id, name:p.name, bid, won, delta, newScore:p.score};
  });
  game.lastRoundSummary = summary;
  const newlyEliminated = active.filter(p=>p.score>=7);
  newlyEliminated.forEach(p=>p.eliminated=true);
  game.phase = 'roundSummary';
  render();
}

function proceedAfterSummary(){
  const remaining = activePlayers();
  if(remaining.length<=1){
    game.phase = 'gameEnd';
    render();
    return;
  }
  // advance dealer to next active seat after current dealer
  const seats = game.players.map(p=>p.seat).sort((a,b)=>a-b);
  let idx = seats.indexOf(game.dealerSeat);
  let next;
  for(let i=1;i<=seats.length;i++){
    const candidateSeat = seats[(idx+i)%seats.length];
    const candidate = game.players.find(p=>p.seat===candidateSeat);
    if(!candidate.eliminated){ next = candidateSeat; break; }
  }
  game.dealerSeat = next;
  game.roundCycleIndex = (game.roundCycleIndex+1) % game.roundCycle.length;
  game.roundNumber++;
  startRound();
  render();
}

const app = document.getElementById('app');

function el(html){
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.firstElementChild;
}

function cardHTML(card, opts){
  opts = opts||{};
  const cls = ['card'];
  if(opts.small) cls.push('small');
  if(opts.clickable) cls.push('clickable');
  if(card.suit==='jolly'){
    cls.push('jolly');
    return `<div class="${cls.join(' ')}" data-card="${card.id}">
      <div class="corner">★</div>
      <div class="icon" style="display:flex;align-items:center;justify-content:center;font-size:${opts.small?'20px':'26px'}">🃏</div>
      <div class="label">Jolly</div>
    </div>`;
  }
  return `<div class="${cls.join(' ')}" data-card="${card.id}">
    <div class="corner">${valueCorner(card.value)}</div>
    <div class="icon">${suitIcon(card.suit, opts.small?22:30)}</div>
    <div class="label">${SUIT_LABEL[card.suit]}</div>
  </div>`;
}

function cardBackHTML(small){
  return `<div class="card back ${small?'small':''}"></div>`;
}

function render(){
  app.innerHTML = '';
  if(!game){ renderSetup(); return; }
  switch(game.phase){
    case 'roundIntro': renderRoundIntro(); break;
    case 'bidding': renderBidding(); break;
    case 'passToBid': renderPassScreen('bid'); break;
    case 'playing': renderPlaying(); break;
    case 'passToPlay': renderPassScreen('play'); break;
    case 'jokerChoice': renderPlaying(true); renderJokerModal(); break;
    case 'blindJokerChoice': renderBlindReveal(); renderJokerModal(); break;
    case 'trickResult': renderTrickResult(); break;
    case 'roundSummary': renderRoundSummary(); break;
    case 'gameEnd': renderGameEnd(); break;
    default: renderSetup();
  }
}

    return `<tr class="${cls.join(' ')}"><td>${p.name}</td><td><span class="${pipCls}">${p.score}</span></td></tr>`;
  }).join('');
  return `<table class="scoreboard"><thead><tr><th>Giocatore</th><th>Punti</th></tr></thead><tbody>${rows}</tbody></table>`;

function renderBidding(){
  const id = currentBidderId();
  const p = playerById(id);
  const K = game.roundCardCount;
  const blind = K===1;
  const hand = game.hands[id];
  const isLast = isLastBidder();
  const sumSoFar = sumBidsSoFar();

  let handSection;
  if(blind){
    // show everyone else's single card, hide own
    const others = game.playOrder.filter(pid=>pid!==id).map(pid=>{
      const c = game.hands[pid][0];
      return `<div class="table-card-slot">${cardHTML(c,{small:true})}<div class="table-card-name">${playerById(pid).name}</div></div>`;
    }).join('');
    handSection = `<p class="center-text" style="opacity:.8;font-size:13px;">Le carte degli altri (la tua è nascosta):</p>
      <div class="hand-row">${others}</div>
      <div class="hand-row">${cardBackHTML(true)}</div>`;
  } else {
    handSection = `<p class="center-text" style="opacity:.8;font-size:13px;">Le tue carte:</p>
      <div class="hand-row">${hand.map(c=>cardHTML(c,{small:true})).join('')}</div>`;
  }

  let bidButtons;
  if(blind){
    bidButtons = [0,1].map(v=>{
      const would = sumSoFar+v;
      const disabled = isLast && would===1 && K===1;
      return `<button class="bid-btn" data-val="${v}" ${disabled?'disabled':''}>${v===1?'Prendo':'No'}</button>`;
    }).join('');
  } else {
    bidButtons = Array.from({length:K+1}).map((_,v)=>{
      const would = sumSoFar+v;
      const disabled = isLast && would===K;
      return `<button class="bid-btn" data-val="${v}" ${disabled?'disabled':''}>${v}</button>`;
    }).join('');
  }

  app.appendChild(el(`<div style="width:100%;display:flex;flex-direction:column;align-items:center;">
    ${header()}
    ${infoBarHTML()}
    <div class="panel center-text">
      <div class="section-title">${p.name}, quante prese farai?</div>
      ${handSection}
      ${blind ? `<p style="font-size:12.5px;opacity:.7;">${isLast ? (sumSoFar===0 ? 'Sei l\'ultimo: non puoi dire "Prendo" (il totale farebbe 1) — devi dire "Non prendo".' : sumSoFar===1 ? 'Sei l\'ultimo: non puoi dire "Non prendo" (il totale resterebbe 1) — devi dire "Prendo".' : 'Sei l\'ultimo a dichiarare, puoi scegliere liberamente.') : 'Ricorda: il totale delle dichiarazioni di questo round non potrà mai essere uguale a 1.'}</p>` : ''}
      ${!blind ? `<p style="font-size:12.5px;opacity:.7;">Totale dichiarato finora: ${sumSoFar}${isLast ? ` — non puoi scegliere ${K-sumSoFar>=0 && K-sumSoFar<=K ? K-sumSoFar : ''} (il totale non può fare ${K})` : ''}</p>` : ''}
      <div class="bid-picker">${bidButtons}</div>
      ${scoreboardHTML(id)}
    </div>
  </div>`));

  document.querySelectorAll('.bid-btn').forEach(btn=>{
    btn.onclick = ()=>{
      if(btn.disabled) return;
      const val = parseInt(btn.dataset.val);
      const wasLast = isLastBidder();
      placeBid(id, val);
      if(!wasLast){
        game.phase = 'passToBid';
        render();
      }
    };
  });
}

// ============================================================
// ============== ONLINE: PARAMETERIZED RULES ===================
// (identical rules to local mode, but operate on a passed-in
// `state` object instead of a global, and never touch the DOM)
// ============================================================
function rActivePlayers(state){ return state.players.filter(p=>!p.eliminated); }

function rSeatOrderFromDealer(state){
  const active = rActivePlayers(state);
  const dealerIdx = active.findIndex(p=>p.seat===state.dealerSeat);
  const order = [];
  for(let i=1;i<=active.length;i++) order.push(active[(dealerIdx+i)%active.length]);
  return order;
}

function rStartRound(state){
  state.roundCardCount = state.roundCycle[state.roundCycleIndex];
  const active = rActivePlayers(state);
  const order = rSeatOrderFromDealer(state);
  state.seatCircle = active.map(p=>p.id);
  state.playOrder = order.map(p=>p.id);
  state.bidOrder = order.map(p=>p.id);
  const deck = shuffle(createDeck());
  state.hands = {};
  active.forEach((p,i)=>{ state.hands[p.id] = deck.slice(i*state.roundCardCount, (i+1)*state.roundCardCount); });
  state.bids = {}; state.tricksWon = {};
  active.forEach(p=>{ state.bids[p.id]=null; state.tricksWon[p.id]=0; });
  state.table = [];
  state.trickIndex = 0;
  state.turnPointer = 0;
  state.pendingJokerCard = null;
  state.phase = 'bidding';
}

function rCurrentBidderId(state){ return state.bidOrder[state.turnPointer]; }
function rCurrentPlayerToPlayId(state){ return state.playOrder[state.turnPointer]; }
function rPlayerById(state,id){ return state.players.find(p=>p.id===id); }

function rSumBidsSoFar(state){
  let sum=0;
  for(const id of state.bidOrder) if(state.bids[id]!==null) sum += state.bids[id];
  return sum;
}
function rIsLastBidder(state){ return state.turnPointer === state.bidOrder.length-1; }
function rValidBidChoices(state){
  const K = state.roundCardCount;
  const blind = K===1;
  const range = blind ? [0,1] : Array.from({length:K+1},(_,i)=>i);
  const sumSoFar = rSumBidsSoFar(state);
  if(rIsLastBidder(state)) return range.filter(v=>sumSoFar+v!==K);
  return range;
}

function rPlaceBid(state, playerId, value){
  if(state.phase!=='bidding' || rCurrentBidderId(state)!==playerId) return;
  if(!rValidBidChoices(state).includes(value)) return;
  state.bids[playerId] = value;
  state.turnPointer++;
  if(state.turnPointer >= state.bidOrder.length){
    state.turnPointer = 0;
    if(state.roundCardCount===1) rAutoPlayBlindRound(state);
    else state.phase = 'playing';
  }
}

function rAutoPlayBlindRound(state){
  state.table = [];
  for(const id of state.playOrder){
    const card = state.hands[id][0];
    state.table.push({playerId:id, card, jokerCall:null});
  }
  const jokerEntry = state.table.find(t=>t.card.suit==='jolly');
  if(jokerEntry){
    state.phase = 'blindJokerChoice';
    state.pendingJokerCard = jokerEntry.playerId;
  } else {
    rResolveTrick(state);
  }
}

function rPlayCard(state, playerId, cardId){
  if(state.phase!=='playing' || rCurrentPlayerToPlayId(state)!==playerId) return;
  const hand = state.hands[playerId];
  const idx = hand.findIndex(c=>c.id===cardId);
  if(idx===-1) return;
  const card = hand[idx];
  if(card.suit==='jolly'){
    state.pendingJokerCard = {playerId, cardIdx:idx};
    state.phase = 'jokerChoice';
    return;
  }
  rFinalizePlay(state, playerId, idx, null);
}

function rFinalizePlay(state, playerId, cardIdx, jokerCall){
  const hand = state.hands[playerId];
  const card = hand.splice(cardIdx,1)[0];
  state.table.push({playerId, card, jokerCall});
  state.turnPointer++;
  if(state.turnPointer >= state.playOrder.length) rResolveTrick(state);
  else state.phase = 'playing';
}

function rConfirmJokerChoice(state, ownerId, choice){
  if(state.phase==='blindJokerChoice'){
    if(state.pendingJokerCard!==ownerId) return;
    const entry = state.table.find(t=>t.playerId===state.pendingJokerCard);
    entry.jokerCall = choice;
    state.pendingJokerCard = null;
    rResolveTrick(state);
    return;
  }
  if(state.phase!=='jokerChoice' || !state.pendingJokerCard || state.pendingJokerCard.playerId!==ownerId) return;
  const {playerId, cardIdx} = state.pendingJokerCard;
  state.pendingJokerCard = null;
  rFinalizePlay(state, playerId, cardIdx, choice);
}

function rEffectiveRank(entry){
  if(entry.card.suit==='jolly') return entry.jokerCall==='alta' ? Infinity : -Infinity;
  return rankOf(entry.card);
}

function rResolveTrick(state){
  let winner = state.table[0];
  for(const entry of state.table) if(rEffectiveRank(entry) > rEffectiveRank(winner)) winner = entry;
  state.tricksWon[winner.playerId]++;
  state.lastTrickWinner = winner.playerId;
  state.phase = 'trickResult';
}

function rNextTrickOrEndRound(state){
  if(state.phase!=='trickResult') return;
  state.table = [];
  state.trickIndex++;
  state.turnPointer = 0;
  if(state.trickIndex >= state.roundCardCount){
    rEndRound(state);
  } else {
    state.playOrder = rotateCircleFrom(state.seatCircle, state.lastTrickWinner);
    state.phase = 'playing';
  }
}

function rEndRound(state){
  const active = rActivePlayers(state);
  const summary = active.map(p=>{
    const bid = state.bids[p.id], won = state.tricksWon[p.id], delta = Math.abs(bid-won);
    p.score += delta;
    return {id:p.id, name:p.name, bid, won, delta, newScore:p.score};
  });
  state.lastRoundSummary = summary;
  active.filter(p=>p.score>=7).forEach(p=>p.eliminated=true);
  state.phase = 'roundSummary';
}

function rProceedAfterSummary(state){
  if(state.phase!=='roundSummary') return;
  const remaining = rActivePlayers(state);
  if(remaining.length<=1){ state.phase='gameEnd'; return; }
  const seats = state.players.map(p=>p.seat).sort((a,b)=>a-b);
  let idx = seats.indexOf(state.dealerSeat);
  let next;
  for(let i=1;i<=seats.length;i++){
    const cs = seats[(idx+i)%seats.length];
    const cand = state.players.find(p=>p.seat===cs);
    if(!cand.eliminated){ next=cs; break; }
  }
  state.dealerSeat = next;
  state.roundCycleIndex = (state.roundCycleIndex+1)%state.roundCycle.length;
  state.roundNumber++;
  rStartRound(state);
}

// ============================================================
const ROOM_PREFIX = 'dalnegro_room_';
const IDENTITY_KEY = 'dalnegro_identity';

let og = null;          // the online room/game state (mirror of shared storage)
let myId = null;
let myRoomCode = null;
let myName = null;
let pollTimer = null;
let autoAdvanceScheduled = false;

function genId(){ return 'p_' + Math.random().toString(36).slice(2,9); }
function genRoomCode(){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // no O/0/I/1/L, less mix-ups
  let s=''; for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function newRoomState(code, hostName, hostId){
  return {
    roomCode: code,
    hostId: hostId,
    players: [{id:hostId, name:hostName, seat:0, score:0, eliminated:false}],
    dealerSeat: 0,
    roundCycle: [5,4,3,2,1],
    roundCycleIndex: 0,
    roundCardCount: 5,
    roundNumber: 1,
    hands:{}, bids:{}, bidOrder:[], tricksWon:{}, playOrder:[],
    turnPointer:0, table:[], trickIndex:0,
    phase:'lobby',
    lastRoundSummary:null, pendingJokerCard:null, seatCircle:[],
    lastTrickWinner:null,
  };
}

async function loadRoom(code){
  try{
    const res = await window.storage.get(ROOM_PREFIX+code, true);
    return res ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}
async function saveRoom(state){
  await window.storage.set(ROOM_PREFIX+state.roomCode, JSON.stringify(state), true);
}
async function loadIdentity(){
  try{
    const res = await window.storage.get(IDENTITY_KEY, false);
    return res ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}
async function saveIdentity(obj){
  try{ await window.storage.set(IDENTITY_KEY, JSON.stringify(obj), false); }catch(e){}
}
async function clearIdentity(){
  try{ await window.storage.delete(IDENTITY_KEY, false); }catch(e){}
}

function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
function startPolling(){
  stopPolling();
  pollTimer = setInterval(pollRoom, 1500);
}
async function pollRoom(){
  if(!myRoomCode) return;
  const fresh = await loadRoom(myRoomCode);
  if(!fresh) return;
  const changed = JSON.stringify(fresh) !== JSON.stringify(og);
  og = fresh;
  if(changed) renderOnline();
  maybeHostAutoAdvance();
}
function maybeHostAutoAdvance(){
  if(!og || og.hostId!==myId) return;
  if(og.phase==='trickResult' && !autoAdvanceScheduled){
    autoAdvanceScheduled = true;
    setTimeout(async ()=>{
      autoAdvanceScheduled = false;
      const fresh = await loadRoom(myRoomCode);
      if(fresh && fresh.phase==='trickResult'){
        rNextTrickOrEndRound(fresh);
        await saveRoom(fresh);
        og = fresh;
        renderOnline();
      }
    }, 2200);
  }
}

// generic helper: fetch latest room, apply a mutation, save, refresh local view
async function actOnline(mutatorFn){
  const fresh = await loadRoom(myRoomCode);
  if(!fresh) return;
  mutatorFn(fresh);
  await saveRoom(fresh);
  og = fresh;
  renderOnline();
}

async function tryAutoRejoin(){
  if(!STORAGE_READY) return false;
  const identity = await loadIdentity();
  if(!identity) return false;
  const room = await loadRoom(identity.roomCode);
  if(!room || !room.players.find(p=>p.id===identity.playerId)){
    await clearIdentity();
    return false;
  }
  myId = identity.playerId; myRoomCode = identity.roomCode; myName = identity.playerName;
  og = room;
  startPolling();
  return true;
}

async function createOrJoinRoom(codeRaw, nameRaw){
  let code = (codeRaw||'').trim().toUpperCase();
  const name = (nameRaw||'').trim() || 'Giocatore';
  if(!code) code = genRoomCode();
  let room = await loadRoom(code);
  const newId = genId();
  let finalName = name;
  if(!room){
    room = newRoomState(code, finalName, newId);
    await saveRoom(room);
  } else {
    if(room.phase !== 'lobby') throw new Error('La partita in questa stanza è già iniziata. Prova un altro codice o aspetta la prossima partita.');
    if(room.players.length >= 8) throw new Error('Questa stanza è già piena (max 8 giocatori).');
    let n = 2;
    while(room.players.some(p=>p.name===finalName)){ finalName = name+' ('+n+')'; n++; }
    room.players.push({id:newId, name:finalName, seat:room.players.length, score:0, eliminated:false});
    await saveRoom(room);
  }
  myId = newId; myRoomCode = code; myName = finalName; og = room;
  await saveIdentity({roomCode:code, playerId:newId, playerName:finalName});
  startPolling();
}

function renderOnlineJoinScreen(errorMsg){
  stopPolling();
  app.innerHTML = '';
  app.appendChild(el(`<div style="width:100%;display:flex;flex-direction:column;align-items:center;">
    ${header()}
    <div class="subtitle">Modalità online — ognuno con il proprio dispositivo</div>
    <div class="panel">
      <div class="section-title">Entra in una partita</div>
      <label class="field-label">Il tuo nome</label>
      <input type="text" id="onlineName" placeholder="Il tuo nome" value="${myName||''}">
      <label class="field-label">Codice stanza</label>
      <input type="text" id="onlineCode" placeholder="Lascia vuoto per crearne una nuova" style="text-transform:uppercase;">
      ${errorMsg?`<p style="color:#e88;font-size:13px;margin-top:8px;">${errorMsg}</p>`:''}
      <div class="btn-row">
        <button class="btn" id="joinBtn">Entra / Crea stanza</button>
      </div>
      <p style="font-size:12px;opacity:.65;margin-top:10px;">Lascia il codice vuoto per creare una stanza nuova da condividere con gli altri. Chi si unisce dopo deve inserire lo stesso codice.</p>
      <div class="center-text"><button class="rules-link" id="backHomeBtn">← Torna alla scelta modalità</button></div>
    </div>
  </div>`));
  document.getElementById('joinBtn').onclick = async ()=>{
    const name = document.getElementById('onlineName').value;
    const code = document.getElementById('onlineCode').value;
    const btn = document.getElementById('joinBtn');
    btn.disabled = true; btn.textContent = 'Attendere...';
    try{
      await createOrJoinRoom(code, name);
      renderOnline();
    }catch(e){
      renderOnlineJoinScreen(e.message || 'Errore, riprova.');
    }
  };
  document.getElementById('backHomeBtn').onclick = showHome;
}

function renderOnline(){
  if(!og){ renderOnlineJoinScreen(); return; }
  switch(og.phase){
    case 'lobby': renderLobby(); break;
    case 'bidding': renderOnlineBidding(); break;
    case 'playing': renderOnlinePlaying(); break;
    case 'jokerChoice':
    case 'blindJokerChoice': renderOnlineJoker(); break;
    case 'trickResult': renderOnlineTrickResult(); break;
    case 'roundSummary': renderOnlineRoundSummary(); break;
    case 'gameEnd': renderOnlineGameEnd(); break;
    default: renderOnlineJoinScreen();
  }
}

function onlineInfoBar(){
  return `<div class="info-bar">
    <div class="chip">Round <span class="v">${og.roundNumber}</span></div>
    <div class="chip">Carte <span class="v">${og.roundCardCount}</span></div>
    <div class="chip">Presa <span class="v">${og.trickIndex+1}/${og.roundCardCount}</span></div>
    <div class="chip">Stanza <span class="v">${og.roomCode}</span></div>
  </div>`;
}
function onlineScoreboard(highlightId){
  const rows = og.players.slice().sort((a,b)=>a.seat-b.seat).map(p=>{
    const cls=[]; if(p.eliminated) cls.push('eliminated'); if(p.id===highlightId) cls.push('current-turn');
    const pipCls = p.score>=5 ? 'score-pip danger' : 'score-pip';
    return `<tr class="${cls.join(' ')}"><td>${p.name}${p.id===myId?' (tu)':''}</td><td><span class="${pipCls}">${p.score}</span></td></tr>`;
  }).join('');
  return `<table class="scoreboard"><thead><tr><th>Giocatore</th><th>Punti</th></tr></thead><tbody>${rows}</tbody></table>`;
}

  const isHost = og.hostId===myId;
  const playersHTML = og.players.map((p,i)=>`<div class="name-row"><div class="seat-badge">${i+1}</div><div>${p.name}${p.id===og.hostId?' 👑':''}${p.id===myId?' <em>(tu)</em>':''}</div></div>`).join('');

    ${header()}

           ${og.players.length<2 ? `<p class="center-text" style="font-size:12px;opacity:.6;">Servono almeno 2 giocatori.</p>` : ''}`
        : `<p class="center-text" style="opacity:.8;margin-top:14px;">⏳ In attesa che l'host avvii la partita...</p>`}
      <div class="center-text"><button class="rules-link" id="leaveBtn">Esci dalla stanza</button></div>

      actOnline(state=>{ rStartRound(state); });
    };
  }
  document.getElementById('leaveBtn').onclick = async ()=>{
    await actOnline(state=>{
      state.players = state.players.filter(p=>p.id!==myId);
      if(state.players.length && !state.players.find(p=>p.id===state.hostId)){
        state.hostId = state.players[0].id;
      }
    });
    await clearIdentity();
    stopPolling();
    og=null; myId=null; myRoomCode=null;

  };
}

  const blind = K===1;
  const myHand = og.hands[myId] || [];
  const sumSoFar = rSumBidsSoFar(og);
  const isLast = rIsLastBidder(og);

  const declaredList = og.bidOrder.map(pid=>{

  }).join('');

    const others = og.playOrder.filter(pid=>pid!==myId).map(pid=>{
      const c = og.hands[pid][0];

  }

  let actionSection;
  if(isMe){
    let bidButtons;
    if(blind){
      bidButtons = [0,1].map(v=>{
        const would = sumSoFar+v;
        const disabled = isLast && would===1;
        return `<button class="bid-btn" data-val="${v}" ${disabled?'disabled':''}>${v===1?'Prendo':'No'}</button>`;
      }).join('');
    } else {
      bidButtons = Array.from({length:K+1}).map((_,v)=>{
        const would = sumSoFar+v;
        const disabled = isLast && would===K;
        return `<button class="bid-btn" data-val="${v}" ${disabled?'disabled':''}>${v}</button>`;
      }).join('');
    }
    actionSection = `<div class="section-title" style="margin-top:16px;">🎯 Quante prese farai?</div>

    actionSection = `<p class="center-text" style="opacity:.8;margin-top:16px;">⏳ In attesa che <strong style="color:var(--gold-light)">${rPlayerById(og,id).name}</strong> dichiari...</p>`;
  }

  app.innerHTML = '';
  app.appendChild(el(`<div style="width:100%;display:flex;flex-direction:column;align-items:center;">
    ${header()}
    ${onlineInfoBar()}
    <div class="panel center-text">

  const eliminatedNames = og.players.filter(p=>p.eliminated).map(p=>p.name);
  app.innerHTML = '';
  app.appendChild(el(`<div style="width:100%;display:flex;flex-direction:column;align-items:center;">
    ${header()}
    <div class="panel">
      <div class="section-title">Fine Round ${og.roundNumber}</div>
      ${rows}
      ${eliminatedNames.length ? `<p class="center-text" style="color:var(--danger);font-weight:800;margin-top:12px;">Eliminati: ${eliminatedNames.join(', ')}</p>` : ''}
      ${onlineScoreboard()}
      ${isHost
        ? `<div class="btn-row"><button class="btn" id="nextBtn">Prossimo round</button></div>`
        : `<p class="center-text" style="opacity:.7;margin-top:10px;">⏳ In attesa che l'host avvii il prossimo round...</p>`}
    </div>
  </div>`));
  if(isHost){
    document.getElementById('nextBtn').onclick = ()=>{ actOnline(state=>{ rProceedAfterSummary(state); }); };
  }
}

function renderOnlineGameEnd(){
  const isHost = og.hostId===myId;
  const winner = rActivePlayers(og)[0];
  app.innerHTML = '';
  app.appendChild(el(`<div style="width:100%;display:flex;flex-direction:column;align-items:center;">
    ${header()}
    <div class="panel center-text">
      <div class="winner-banner">🏆 ${winner?winner.name:'—'}${winner&&winner.id===myId?' (tu!)':''} vince la partita!</div>
      ${onlineScoreboard()}
      ${isHost
        ? `<div class="btn-row"><button class="btn" id="rematchBtn">Rivincita (stessi giocatori)</button></div>`
        : `<p class="center-text" style="opacity:.7;margin-top:10px;">⏳ In attesa che l'host avvii una rivincita...</p>`}
      <div class="center-text"><button class="rules-link" id="leaveGameBtn">Esci dalla stanza</button></div>
    </div>
  </div>`));
  if(isHost){
    document.getElementById('rematchBtn').onclick = ()=>{
      actOnline(state=>{
        state.players.forEach(p=>{ p.score=0; p.eliminated=false; });
        state.dealerSeat = state.players[0].seat;
        state.roundCycleIndex = 0;
        state.roundNumber = 1;
        state.phase = 'lobby';
      });
    };
  }
  document.getElementById('leaveGameBtn').onclick = async ()=>{
    stopPolling();
    await clearIdentity();
    og=null; myId=null; myRoomCode=null;
    showHome();
  };
}

// ============================================================
// ============== BOOT ===========================================
// ============================================================
async function boot(){
  const rejoined = await tryAutoRejoin();
  if(rejoined){ renderOnline(); return; }
  showHome();
}
boot();
</script>

</html>
